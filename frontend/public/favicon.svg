<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Left side - Document/Resume -->
  <g transform="translate(65, 100)">
    <rect x="-14" y="-20" width="28" height="40" fill="url(#greenGrad)" rx="2"/>
    <line x1="-9" y1="-14" x2="9" y2="-14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-9" y1="-6" x2="9" y2="-6" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
    <line x1="-9" y1="2" x2="9" y2="2" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
    <line x1="-9" y1="10" x2="7" y2="10" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
  </g>
  
  <!-- Right side - Briefcase/Job -->
  <g transform="translate(135, 100)">
    <rect x="-14" y="-16" width="28" height="32" fill="url(#cyanGrad)" rx="2.5"/>
    <path d="M -10 -16 Q -10 -25 0 -25 Q 10 -25 10 -16" stroke="url(#cyanGrad)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="0" y1="-16" x2="0" y2="16" stroke="white" stroke-width="2" opacity="0.7"/>
  </g>
  
  <!-- Center AI connection -->
  <g transform="translate(100, 100)">
    <circle cx="0" cy="0" r="9" fill="none" stroke="url(#greenGrad)" stroke-width="1.8"/>
    <circle cx="12" cy="0" r="2.5" fill="url(#cyanGrad)"/>
    <circle cx="-12" cy="0" r="2.5" fill="url(#cyanGrad)"/>
    <circle cx="0" cy="12" r="2.5" fill="url(#cyanGrad)"/>
    <circle cx="0" cy="0" r="3.5" fill="url(#greenGrad)"/>
  </g>
  
  <!-- Connection lines -->
  <path d="M 78 96 Q 88 98 96 102" stroke="url(#greenGrad)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M 104 102 Q 112 98 122 96" stroke="url(#cyanGrad)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8"/>
</svg>