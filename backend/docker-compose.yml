version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: job_intelligence_db
    environment:
      POSTGRES_USER: ${DB_USER:-jobuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-jobpassword}
      POSTGRES_DB: ${DB_NAME:-job_intelligence}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-jobuser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - job_intelligence_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: job_intelligence_api
    environment:
      DATABASE_URL: postgresql://${DB_USER:-jobuser}:${DB_PASSWORD:-jobpassword}@postgres:5432/${DB_NAME:-job_intelligence}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-True}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - job_intelligence_network

volumes:
  postgres_data:

networks:
  job_intelligence_network:
    driver: bridge
